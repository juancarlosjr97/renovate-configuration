---
name: Release
on:
  push:
    branches:
      - main

jobs:
  release-automation:
    # Pin to the latest version to avoid circular dependency
    uses: juancarlosjr97/github-actions-workflows-to-rule-them-all/.github/workflows/shared-release-automation.yml@1c3ed2917764ff90bbef2e519165c9bb353b0f49 # main
    secrets:
      PROJECT_GITHUB_TOKEN: ${{ secrets.PROJECT_GITHUB_TOKEN }}
    with:
      PLUGIN_LIST: "@release-it/conventional-changelog,@release-it/bumper"
