---
name: Release
on:
  push:
    branches:
      - main

jobs:
  release-automation:
    # Pin to the latest version to avoid circular dependency
    uses: juancarlosjr97/github-actions-workflows-to-rule-them-all/.github/workflows/shared-release-automation.yml@e25d123a5fbc181341eb188c35a7c1552cfb6393 # main
    secrets:
      PROJECT_GITHUB_TOKEN: ${{ secrets.PROJECT_GITHUB_TOKEN }}
    with:
      PLUGIN_LIST: "@release-it/conventional-changelog,@release-it/bumper"
