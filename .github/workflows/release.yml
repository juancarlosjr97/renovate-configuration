---
name: Release
on:
  push:
    branches:
      - main

jobs:
  release-automation:
    # Pin to the latest version to avoid circular dependency
    uses: juancarlosjr97/github-actions-workflows-to-rule-them-all/.github/workflows/shared-release-automation.yml@4c7b1858828e77da6595546df365cf163332305f # main
    secrets:
      PROJECT_GITHUB_TOKEN: ${{ secrets.PROJECT_GITHUB_TOKEN }}
    with:
      PLUGIN_LIST: "@release-it/conventional-changelog,@release-it/bumper"
